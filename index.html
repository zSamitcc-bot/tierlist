<!DOCTYPE html>
<html>
<head>
    <title>Tier List</title>
</head>
<body>

<h1>Tier List</h1>

<h2>S</h2>
<div id="S"></div>

<h2>A</h2>
<div id="A"></div>

<h2>B</h2>
<div id="B"></div>

<h2>C</h2>
<div id="C"></div>

<h2>D</h2>
<div id="D"></div>

<script>
fetch("http://ca-01.rrhosting.eu:7575/api/top")
.then(res => res.json())
.then(data => {

    data.forEach(p => {
        var div = document.getElementById(p.tier);

        div.innerHTML += 
            p.name + " - " + p.kills + " kills - " + p.deaths + " deaths<br>";
    });

});
</script>

</body>
</html>
